appId: com.justinmcgill.queue
productName: Queue
directories:
  buildResources: build
  output: dist
files:
  - out/**
asarUnpack:
  - '**/*.node'
mac:
  category: public.app-category.entertainment
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
dmg:
  title: ${productName}
publish:
  provider: github
  owner: JJMcGil1
  repo: queue
npmRebuild: true
