name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Disable Spotlight indexing (hdiutil flakiness fix)
        run: sudo mdutil -a -i off

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package DMG (${{ matrix.arch }})
        run: npx electron-builder --mac --${{ matrix.arch }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.blockmap
          retention-days: 1

  release:
    needs: build
    runs-on: macos-14
    steps:
      - name: Download all DMGs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dmg-*
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" dist/*.dmg dist/*.blockmap \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Queue ${tag#v}" \
            --generate-notes
